<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<link rel="stylesheet" href="login12.css">
</head>
<body>

<div class="main">

    <!-- LEFT IMAGE -->
    <div class="image-side">
        <img src="login.jpg" alt="signup image">
    </div>

    <!-- RIGHT FORM -->
    <div class="form-side">

        <h2>Get Started Now</h2>

        <!-- Name -->
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <!-- Email -->
        <label>Email</label>
        <input type="email" id="email"  placeholder="Enter your email address" required>

        <!-- Password -->
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <!-- Checkbox -->
        <div class="terms">
            <input type="checkbox" id="check">
            <label for="check">I agree to all policies</label>
        </div>

        <!-- Button -->
        <button id="signupBtn" disabled>Sign Up</button>

        <!-- spacing text -->
        <p class="info">Or</p>

        <!-- Social buttons -->
        <div class="social">
            <button class="google">Continue with Google</button>
            <button class="apple">Continue with Apple</button>
        </div>

        <!-- Sign in -->
        <p class="signin-text">
            Already have account?<span class="link">Sign In</span>
        </p>

    </div>

</div>
<script src="login12.js"></script>
</body>
</html>
